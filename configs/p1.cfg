set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 address 10.0.0.2/30

set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 0 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 address 10.0.1.1/30

set / network-instance default admin-state enable
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0

set / network-instance default next-hop-groups group nh-pe1 nexthop 1 admin-state enable
set / network-instance default next-hop-groups group nh-pe1 nexthop 1 ip-address 10.0.0.1
set / network-instance default static-routes route 192.168.1.0/24 admin-state enable
set / network-instance default static-routes route 192.168.1.0/24 next-hop-group nh-pe1
set / network-instance default static-routes route 192.168.3.0/24 admin-state enable
set / network-instance default static-routes route 192.168.3.0/24 next-hop-group nh-pe1

set / network-instance default next-hop-groups group nh-pe2 nexthop 1 admin-state enable
set / network-instance default next-hop-groups group nh-pe2 nexthop 1 ip-address 10.0.1.2
set / network-instance default static-routes route 192.168.2.0/24 admin-state enable
set / network-instance default static-routes route 192.168.2.0/24 next-hop-group nh-pe2
set / network-instance default static-routes route 192.168.4.0/24 admin-state enable
set / network-instance default static-routes route 192.168.4.0/24 next-hop-group nh-pe2

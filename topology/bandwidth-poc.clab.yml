# ContainerLab topology for bandwidth-allocation PoC.
#
# Layout (data-plane only):
#
#   ce1 ── eth1 ──[e1-2  pe1  e1-1]── e1-1  pe2  e1-2 ── eth1 ── ce2
#   192.168.1.10  192.168.1.1  10.0.0.1   10.0.0.2  192.168.2.1  192.168.2.10
#   /24                        /30        /30                    /24
#
# Management interfaces of all 4 nodes attach to the default `clab` docker
# network (172.20.20.0/24) — that's how Python/gNMI/SSH reach the PEs.

name: bandwidth-poc

topology:
  kinds:
    nokia_srlinux:
      # ixrd2l is one of the 7220 IXR types that supports the qos policer
      # YANG paths we'll use in Phase 1. The datapath in license-less mode
      # is capped at 1000 PPS (~12 Mbps), so keep allocations modest.
      type: ixr-d2l
      image: ghcr.io/nokia/srlinux:latest
    linux:
      # multitool image ships with iperf3, ping, traceroute, tcpdump, etc.
      image: ghcr.io/hellt/network-multitool

  nodes:
    pe1:
      kind: nokia_srlinux
      startup-config: ../configs/pe1.cfg
    pe2:
      kind: nokia_srlinux
      startup-config: ../configs/pe2.cfg

    ce1:
      kind: linux
      exec:
        - ip address add 192.168.1.10/24 dev eth1
        - ip route add 192.168.2.0/24 via 192.168.1.1
    ce2:
      kind: linux
      exec:
        - ip address add 192.168.2.10/24 dev eth1
        - ip route add 192.168.1.0/24 via 192.168.2.1

  links:
    # Backbone link between the two PEs.
    - endpoints: ["pe1:e1-1", "pe2:e1-1"]
    # Customer-facing links (where the policer will be applied in Phase 1).
    - endpoints: ["pe1:e1-2", "ce1:eth1"]
    - endpoints: ["pe2:e1-2", "ce2:eth1"]

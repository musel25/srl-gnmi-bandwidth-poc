# ContainerLab topology for bandwidth-allocation PoC — Phase 2.
#
# Phase 2 layout (data-plane):
#
#   ce1 (192.168.1.10/24) ── pe1:e1-2        pe2:e1-2 ── ce2 (192.168.2.10/24)
#   ce3 (192.168.3.10/24) ── pe1:e1-3        pe2:e1-3 ── ce4 (192.168.4.10/24)
#                  pe1:e1-1 ── p1:e1-1  p1:e1-2 ── pe2:e1-1
#                   (10.0.0.0/30)          (10.0.1.0/30)
#
# Management interfaces: clab network 172.20.20.0/24
name: bandwidth-poc

topology:
  kinds:
    nokia_srlinux:
      type: ixr-d2l
      image: ghcr.io/nokia/srlinux:latest
    linux:
      image: ghcr.io/hellt/network-multitool

  nodes:
    p1:
      kind: nokia_srlinux
      startup-config: ../configs/p1.cfg

    pe1:
      kind: nokia_srlinux
      startup-config: ../configs/pe1.cfg
    pe2:
      kind: nokia_srlinux
      startup-config: ../configs/pe2.cfg

    ce1:
      kind: linux
      exec:
        - ip address add 192.168.1.10/24 dev eth1
        - ip route add 192.168.2.0/24 via 192.168.1.1
        - ip route add 192.168.3.0/24 via 192.168.1.1
        - ip route add 192.168.4.0/24 via 192.168.1.1
    ce2:
      kind: linux
      exec:
        - ip address add 192.168.2.10/24 dev eth1
        - ip route add 192.168.1.0/24 via 192.168.2.1
        - ip route add 192.168.3.0/24 via 192.168.2.1
        - ip route add 192.168.4.0/24 via 192.168.2.1
    ce3:
      kind: linux
      exec:
        - ip address add 192.168.3.10/24 dev eth1
        - ip route add 192.168.1.0/24 via 192.168.3.1
        - ip route add 192.168.2.0/24 via 192.168.3.1
        - ip route add 192.168.4.0/24 via 192.168.3.1
    ce4:
      kind: linux
      exec:
        - ip address add 192.168.4.10/24 dev eth1
        - ip route add 192.168.1.0/24 via 192.168.4.1
        - ip route add 192.168.2.0/24 via 192.168.4.1
        - ip route add 192.168.3.0/24 via 192.168.4.1

  links:
    - endpoints: ["pe1:e1-1", "p1:e1-1"]
    - endpoints: ["p1:e1-2", "pe2:e1-1"]
    - endpoints: ["pe1:e1-2", "ce1:eth1"]
    - endpoints: ["pe2:e1-2", "ce2:eth1"]
    - endpoints: ["pe1:e1-3", "ce3:eth1"]
    - endpoints: ["pe2:e1-3", "ce4:eth1"]
